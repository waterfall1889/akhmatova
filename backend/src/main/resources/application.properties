spring.application.name=beckend

# Optional: copy database_config/database.properties.example -> database_config/database.properties
# (Run Maven / IDE with working directory = backend/ so ../database_config resolves.)
spring.config.import=optional:file:../database_config/database.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

app.auth.allow-legacy-plaintext=false

app.auth.frontend-login-url=${APP_AUTH_FRONTEND_LOGIN_URL:http://localhost:5173/login}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=BECKEND_SESSION
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.servlet.session.tracking-modes=cookie
